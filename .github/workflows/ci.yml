name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        timeout-minutes: 5
        run: test -z "$(gofmt -l .)"

      - name: Unit tests
        timeout-minutes: 10
        run: go test ./...

      - name: Race tests
        timeout-minutes: 15
        run: go test -race ./...

      - name: Race stress (adapters/message/supervisor)
        timeout-minutes: 20
        run: go test -race ./internal/adapter/... ./internal/message/... ./internal/supervisor/... -count=5

      - name: Production-path worker identity regressions
        timeout-minutes: 10
        run: go test -race ./cmd/subagent-broker -run 'TestMCPWorkerEnvIdentity|TestClaudeHookEnvIdentity|TestWorkerIdentityMismatch' -count=3

      - name: Decision/auth/lease ownership regressions
        timeout-minutes: 15
        run: go test -race ./internal/supervisor -run 'TestSupervisorLease|TestRequestMessage|TestNativePermission|TestResolve|TestExpire|TestDecisionPublication|TestUnbound|TestBind|TestWorkerCredential' -count=20

      - name: Decision publication and native permission setup races
        timeout-minutes: 15
        run: go test -race ./internal/supervisor -run 'TestRequestMessage|TestNativePermission|TestResolve|TestExpire|TestDecisionPublication' -count=100

      - name: OpenCode turn ownership regressions
        timeout-minutes: 10
        run: go test -race ./internal/adapter/opencode -run 'Test.*Turn|Test.*Idle|Test.*Historical|Test.*Baseline|TestEmpty|TestStale|TestDuplicate|TestOld' -count=20

      - name: Codex terminal-boundary regressions
        timeout-minutes: 10
        run: go test -race ./internal/adapter/codex -run 'TestAppServerSessionContract|TestCodexTerminal|TestCodexUnexpectedEOF' -count=100

      - name: Vet
        timeout-minutes: 5
        run: go vet ./...

      - name: Build
        timeout-minutes: 5
        run: go build ./cmd/subagent-broker
